<!DOCTYPE html>
<html>
    <head>
        <title>React Basics</title>
        <style>
            body{
                 font-family: arial;
                 margin-top: 0px;
                 margin-bottom: 0px;
            }
            .send-button{
                background-color: rgb(25,135,84);
                color: white;
                border: none;
                border-radius: 10px;
                padding: 12px 20px;
                margin-left: 10px;
                font-size: 15px;
                cursor: pointer;
            }
            .chat-input{
                padding: 12px 15px;
                border-radius: 10px;
                border-width: 1px;
                font-size: 15px;

                flex-grow: 1;
            }
            .chat-input-container{
                display: flex;
                margin-bottom: 60px;
            }
            .app-container{
                max-width: 600px;
                margin-left: auto;
                margin-right: auto;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            .chat-msg-user{
                display: flex;
                justify-content: end;
                align-items: start;
            }
            .chat-msg-text{
                background-color: rgb(238,238,238);
                padding: 15px 20px;
                border-radius: 10px;
                margin-right: 10px;
                margin-left: 10px;
                max-width: 300px;
            }
            .chat-msg-robot{
                display: flex;
                align-items: start;
            }
            .chat-msg-profile{
                width: 45px;
            }
            .chat-msg-container{
                flex-grow: 1;
                margin-top: 20px;
                overflow: scroll;
                scrollbar-width: none;
            }
        </style>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>

        <script type="text/babel">

            function ChatInput({chatMessages,setChatMessages}){
                const [inputText,setInputText]=React.useState('');

                function saveInputText(event){
                    setInputText(event.target.value);
                }

                function sendMessage(){
                    const newChatMessages=[
                        ...chatMessages,
                        {
                            message:inputText,
                            sender:'user',
                            id:crypto.randomUUID()
                        }
                    ];
                    setChatMessages(newChatMessages);

                    const response=Chatbot.getResponse(inputText);
                    setChatMessages([
                        ...newChatMessages,
                        {
                            message:response,
                            sender:'robot',
                            id:crypto.randomUUID()
                        }
                    ]);

                    setInputText('');
                }
                return(
                    <div className="chat-input-container">
                        <input 
                        placeholder="send a message to chatbot" 
                        size="30"
                        onChange={saveInputText}
                        value={inputText}
                        className="chat-input"
                        />

                        <button onClick={sendMessage} className="send-button"> Send</button>
                    </div>
                );
            }


            function ChatMessage({message,sender}){
                /*const message=props.message;
               const sender=props.sender;
                const {message,sender}=props;

                if(sender==='robot'){
                    return(
                        <div>
                            <img src="robot.png" width="50"/>
                            {message}
                        </div>
                    );
                }*/
                return(
                    <div className={sender==='user'? 'chat-msg-user' : 'chat-msg-robot'}>
                      {sender==='robot' && (<img src="robot.png" className="chat-msg-profile"/>)}

                      <div className="chat-msg-text">
                        {message}
                      </div>

                      {sender==='user' && (<img src="user.png" className="chat-msg-profile"/>)}
                    </div>
                );
            }

            function ChatMessages({chatMessages}){
                /*function sendMessage(){
                    setChatMessages([
                        ...chatMessages,
                        {
                            message:'test',
                            sender:'user',
                            id:crypto.randomUUID()
                        }
                    ]);
                }*/
                const chatMessageRef=React.useRef(null);
                
                React.useEffect(() =>{
                  const containerElem=chatMessageRef.current;  
                  if(containerElem){
                    containerElem.scrollTop=containerElem.scrollHeight;
                  }
                },[chatMessages]);
                
                return(
                    //to generate html we use this function
                    <div className="chat-msg-container" ref={chatMessageRef}>
                        {chatMessages.map((chatMessage) =>{
                            return(
                                <ChatMessage 
                                message={chatMessage.message}
                                sender={chatMessage.sender}
                                key={chatMessage.id}
                                />
                            );
                        })
                        }
                    </div>
                );
            }

            function App(){

                 //we kept the data inside the chatMessages or our msgs in React.useState() to change it into state
                const [chatMessages,setChatMessages]=React.useState([{
                    message:'hello chatbot',
                    sender:'user',
                    id:'id1'
                },{
                    message:'hello,how can i help you?',
                    sender:'robot',
                    id:'id2'
                }]);

                return(
                 <div className="app-container">
                  <ChatMessages
                   chatMessages={chatMessages}
                  />
                  <ChatInput 
                   chatMessages={chatMessages}
                   setChatMessages={setChatMessages}
                  />
                 </div>
                );
            }
           

            const container=document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
